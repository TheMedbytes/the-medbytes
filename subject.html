<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Subject</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Choose Your Subject</h2>
        <div class="grid">
            <button onclick="selectSubject('Pathology')">Pathology</button>
            <button onclick="selectSubject('Pharmacology')">Pharmacology</button>
            <button onclick="selectSubject('Microbiology')">Microbiology</button>
            <button onclick="selectSubject('Community Medicine')">Community Med</button>
            <button onclick="selectSubject('Medicine')">Medicine</button>
            <button onclick="selectSubject('Surgery')">Surgery</button>
            <button onclick="selectSubject('Random')">Mixed Subjects</button>
        </div>
        <div class="card mode-box">
            <h3>Mode</h3>
            <label><input type="radio" name="mode" value="practice" checked> Practice (Unlimited)</label>
            <label><input type="radio" name="mode" value="timed"> Timed Test (20 Qs)</label>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
