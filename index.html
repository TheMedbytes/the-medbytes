<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedBytes | MBBS MCQ Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">
    
    <nav>
        <div class="logo">
            <img src="logo.png" alt="Logo" id="nav-logo">
            <span>MedBytes</span>
        </div>
        <div class="nav-actions">
            <button id="admin-btn" onclick="showView('admin-screen')" title="Admin Panel"><i class="fas fa-user-shield"></i></button>
            <button id="theme-toggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
            <button id="logout-btn" class="hidden" onclick="handleLogout()">Logout</button>
        </div>
    </nav>

    <main class="container">
        <section id="auth-screen" class="view">
            <div class="card">
                <img src="logo.png" alt="Logo" class="hero-logo">
                <h1>3rd Year MBBS MCQ Bank</h1>
                <p>Blocks 7, 8 & 9</p>
                <div class="auth-inputs">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="password" id="password" placeholder="Password">
                    <button class="btn-primary" onclick="login()">Login</button>
                    <button class="btn-secondary" onclick="register()">Register Account</button>
                </div>
            </div>
        </section>

        <section id="dashboard-screen" class="view hidden">
            <div class="welcome-bar">
                <h2>Welcome, <span id="user-display-name">Doctor</span>!</h2>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card"><h3>0</h3><p>Solved</p></div>
                <div class="stat-card"><h3>0%</h3><p>Accuracy</p></div>
                <div class="stat-card"><h3>0</h3><p>Streak</p></div>
            </div>

            <div class="card" style="margin-bottom: 20px; max-width: 100%;">
                <h4>Quiz Mode</h4>
                <div class="mode-options">
                    <label><input type="radio" name="quiz-mode" value="practice" checked> Practice</label>
                    <label><input type="radio" name="quiz-mode" value="exam"> Exam (Timed)</label>
                </div>
            </div>

            <h3>Subjects</h3>
            <div class="subject-grid" id="subject-list"></div>
        </section>

        <section id="quiz-screen" class="view hidden">
            <div class="quiz-header">
                <span id="quiz-subject-title">Subject</span>
                <span id="quiz-progress">0 / 0</span>
            </div>
            <div class="card" style="max-width: 100%; text-align: left;">
                <h2 id="question-text">Loading...</h2>
                <div id="options-list"></div>
                <div id="explanation-box" class="hidden">
                    <p id="explanation-text"></p>
                    <button class="btn-primary" onclick="loadNextQuestion()">Next Question</button>
                </div>
            </div>
        </section>

        <section id="admin-screen" class="view hidden">
            <div class="card">
                <h2>Admin Panel</h2>
                <p>Admin features have been moved to the dedicated management portal.</p>
                <button onclick="showView('dashboard-screen')" class="btn-secondary">Back to Dashboard</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDc-yEvFYvP8_OZedCyIqXjpEOnocOe87k",
            authDomain: "the-medbytes-4e614.firebaseapp.com",
            projectId: "the-medbytes-4e614",
            storageBucket: "the-medbytes-4e614.firebasestorage.app",
            messagingSenderId: "508245128582",
            appId: "1:508245128582:web:c4285259f6812a30026807",
            measurementId: "G-GYJ0EHS7M5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const subjects = ["Pharmacology", "Pathology", "Forensic Medicine", "Community Medicine", "Medicine", "Surgery", "Behavioral Sciences", "Patient Safety", "Family Medicine"];
        let currentQuestions = [];
        let currentIndex = 0;

        // --- THEME LOGIC ---
        const themeBtn = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }
        themeBtn.onclick = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        // --- AUTH ---
        window.login = () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
        };
        window.register = () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            createUserWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
        };
        window.handleLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                document.getElementById('logout-btn').classList.remove('hidden');
                showView('dashboard-screen');
                renderSubjects();
            } else {
                showView('auth-screen');
                document.getElementById('logout-btn').classList.add('hidden');
            }
        });

        // --- QUIZ LOGIC ---
        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            subjects.forEach(s => {
                const div = document.createElement('div');
                div.className = 'subject-card';
                div.innerHTML = `<h4>${s}</h4><button onclick="startQuiz('${s}')">Start Quiz</button>`;
                list.appendChild(div);
            });
        }

        window.startQuiz = async (subject) => {
            const mode = document.querySelector('input[name="quiz-mode"]:checked').value;
            const q = query(collection(db, "mcqs"), where("subject", "==", subject));
            const snapshot = await getDocs(q);
            currentQuestions = snapshot.docs.map(doc => doc.data()).sort(() => Math.random() - 0.5);
            
            if (mode === 'exam') currentQuestions = currentQuestions.slice(0, 20);
            if (currentQuestions.length === 0) return alert("No questions found for this subject.");

            currentIndex = 0;
            showView('quiz-screen');
            loadQuestion();
        };

        function loadQuestion() {
            const data = currentQuestions[currentIndex];
            document.getElementById('quiz-subject-title').innerText = data.subject;
            document.getElementById('quiz-progress').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('question-text').innerText = data.question;
            document.getElementById('explanation-box').classList.add('hidden');
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            ['A', 'B', 'C', 'D', 'E'].forEach(l => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = `${l}: ${data['option' + l]}`;
                b.onclick = () => {
                    const correct = data.correctAnswer;
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.disabled = true;
                        if(btn.innerText.startsWith(correct)) btn.classList.add('correct');
                        else if(btn.innerText.startsWith(l)) btn.classList.add('wrong');
                    });
                    document.getElementById('explanation-text').innerText = data.explanation;
                    document.getElementById('explanation-box').classList.remove('hidden');
                };
                list.appendChild(b);
            });
        }

        window.loadNextQuestion = () => {
            currentIndex++;
            if (currentIndex < currentQuestions.length) loadQuestion();
            else { alert("Quiz Complete!"); showView('dashboard-screen'); }
        };
    </script>
</body>
</html>
