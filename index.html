<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBytes | MBBS MCQ Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">
    
    <nav>
        <div class="logo">
            <img src="logo.png" alt="MedBytes Logo" id="nav-logo">
            <span>MedBytes</span>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
            <button id="logout-btn" class="hidden" onclick="handleLogout()">Logout</button>
        </div>
    </nav>

    <main class="container">
        <section id="auth-screen" class="view">
            <div class="card">
                <img src="logo.png" alt="Logo" class="hero-logo">
                <h1>3rd Year MBBS MCQ Bank</h1>
                <p>Blocks 7, 8 & 9</p>
                <div class="auth-inputs">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="password" id="password" placeholder="Password">
                    <button class="btn-primary" onclick="login()">Login</button>
                    <button class="btn-secondary" onclick="register()">Register Account</button>
                </div>
            </div>
        </section>

        <section id="dashboard-screen" class="view hidden">
            <div class="welcome-bar">
                <h2>Welcome back, <span id="user-display-name">Doctor</span>!</h2>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="stat-attempted">0</h3>
                    <p>MCQs Solved</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-accuracy">0%</h3>
                    <p>Accuracy</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-streak">0</h3>
                    <p>Day Streak</p>
                </div>
            </div>

            <h3>Select Subject (Practice Mode)</h3>
            <div class="subject-grid" id="subject-list">
                </div>
        </section>

        <section id="quiz-screen" class="view hidden">
            <div class="quiz-header">
                <span id="quiz-subject-title">Subject</span>
                <span id="quiz-progress">0 / 0</span>
            </div>
            <div class="question-card">
                <h2 id="question-text">Loading question...</h2>
                <div id="options-list"></div>
                
                <div id="explanation-box" class="hidden">
                    <hr>
                    <h4><i class="fas fa-info-circle"></i> Explanation</h4>
                    <p id="explanation-text"></p>
                    <button class="btn-primary" onclick="loadNextQuestion()">Next Question <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDc-yEvFYvP8_OZedCyIqXjpEOnocOe87k",
            authDomain: "the-medbytes-4e614.firebaseapp.com",
            projectId: "the-medbytes-4e614",
            storageBucket: "the-medbytes-4e614.firebasestorage.app",
            messagingSenderId: "508245128582",
            appId: "1:508245128582:web:c4285259f6812a30026807",
            measurementId: "G-GYJ0EHS7M5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Subjects List
        const subjects = [
            "Pharmacology", "Pathology", "Forensic Medicine", 
            "Community Medicine", "Medicine", "Surgery", 
            "Behavioral Sciences", "Patient Safety", "Family Medicine"
        ];

        // UI View Switcher
        window.showView = function(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId !== 'auth-screen') document.getElementById('logout-btn').classList.remove('hidden');
        };

        // --- AUTH ---
        window.register = function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => alert("Welcome to MedBytes!"))
                .catch(err => alert(err.message));
        };

        window.login = function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, password)
                .catch(err => alert(err.message));
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                showView('dashboard-screen');
                renderSubjects();
            } else {
                showView('auth-screen');
            }
        });

        // --- DASHBOARD ---
        function renderSubjects() {
            const grid = document.getElementById('subject-list');
            grid.innerHTML = '';
            subjects.forEach(s => {
                const div = document.createElement('div');
                div.className = 'subject-card';
                div.innerHTML = `<h4>${s}</h4><button class="btn-sm" onclick="startQuiz('${s}')">Start</button>`;
                grid.appendChild(div);
            });
        }

        // --- QUIZ LOGIC ---
        let currentQuestions = [];
        let currentIndex = 0;

        window.startQuiz = async (subject) => {
            const q = query(collection(db, "mcqs"), where("subject", "==", subject));
            const snapshot = await getDocs(q);
            currentQuestions = snapshot.docs.map(doc => doc.data());
            
            if(currentQuestions.length === 0) {
                alert("No questions added for this subject yet. Go to Admin to add some!");
                return;
            }
            
            currentIndex = 0;
            showView('quiz-screen');
            loadQuestion();
        };

        function loadQuestion() {
            const data = currentQuestions[currentIndex];
            document.getElementById('quiz-subject-title').innerText = data.subject;
            document.getElementById('quiz-progress').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('question-text').innerText = data.question;
            document.getElementById('explanation-box').classList.add('hidden');

            const optionsDiv = document.getElementById('options-list');
            optionsDiv.innerHTML = '';
            
            ['A', 'B', 'C', 'D', 'E'].forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${letter}: ${data['option' + letter]}`;
                btn.onclick = () => handleAnswer(letter, data.correctAnswer, data.explanation);
                optionsDiv.appendChild(btn);
            });
        }

        function handleAnswer(selected, correct, explanation) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => {
                b.disabled = true;
                if(b.innerText.startsWith(correct)) b.classList.add('correct');
                else if(b.innerText.startsWith(selected) && selected !== correct) b.classList.add('wrong');
            });
            
            document.getElementById('explanation-text').innerText = explanation;
            document.getElementById('explanation-box').classList.remove('hidden');
        }

        window.loadNextQuestion = () => {
            currentIndex++;
            if(currentIndex < currentQuestions.length) loadQuestion();
            else {
                alert("Quiz finished!");
                showView('dashboard-screen');
            }
        };

        // Theme Toggle
        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
        };

    </script>
</body>
</html>
