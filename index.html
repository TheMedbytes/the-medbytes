<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBytes | MBBS MCQ Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">
    
    <nav>
        <div class="logo">
            <img src="logo.png" alt="MedBytes Logo" id="nav-logo">
            <span>MedBytes</span>
        </div>
        <div class="nav-actions">
            <button onclick="showView('admin-screen')"><i class="fas fa-user-shield"></i></button>
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
            <button id="logout-btn" class="hidden" onclick="handleLogout()">Logout</button>
        </div>
    </nav>

    <main class="container">
        <section id="auth-screen" class="view">
            <div class="card">
                <img src="logo.png" alt="Logo" class="hero-logo">
                <h1>3rd Year MBBS MCQ Bank</h1>
                <p>Blocks 7, 8 & 9</p>
                <div class="auth-inputs">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="password" id="password" placeholder="Password">
                    <button class="btn-primary" onclick="login()">Login</button>
                    <button class="btn-secondary" onclick="register()">Register Account</button>
                </div>
            </div>
        </section>

        <section id="dashboard-screen" class="view hidden">
            <div class="welcome-bar">
                <h2>Welcome, <span id="user-display-name">Doctor</span>!</h2>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card"><h3>0</h3><p>Solved</p></div>
                <div class="stat-card"><h3>0%</h3><p>Accuracy</p></div>
                <div class="stat-card"><h3>0</h3><p>Streak</p></div>
            </div>

            <div class="card" style="margin-bottom: 20px;">
                <h4>Select Quiz Mode</h4>
                <div class="mode-options">
                    <label><input type="radio" name="quiz-mode" value="practice" checked> Practice</label>
                    <label><input type="radio" name="quiz-mode" value="exam"> Exam (Timed)</label>
                </div>
            </div>

            <h3>Subjects</h3>
            <div class="subject-grid" id="subject-list"></div>
        </section>

        <section id="quiz-screen" class="view hidden">
            <div class="quiz-header">
                <span id="quiz-subject-title">Subject</span>
                <span id="quiz-progress">0 / 0</span>
            </div>
            <div class="card" style="max-width: 100%; text-align: left;">
                <h2 id="question-text">Loading...</h2>
                <div id="options-list"></div>
                <div id="explanation-box" class="hidden">
                    <p id="explanation-text" style="background: #eef6ff; padding: 15px; border-radius: 8px;"></p>
                    <button onclick="loadNextQuestion()">Next Question</button>
                </div>
            </div>
        </section>

        <section id="admin-screen" class="view hidden">
            <div class="card" style="max-width: 500px;">
                <h2>Add New MCQ</h2>
                <select id="admin-subject">
                    <option value="Pharmacology">Pharmacology</option>
                    <option value="Pathology">Pathology</option>
                    <option value="Forensic Medicine">Forensic Medicine</option>
                </select>
                <textarea id="admin-question" placeholder="Question Text"></textarea>
                <input type="text" id="admin-optA" placeholder="Option A">
                <input type="text" id="admin-optB" placeholder="Option B">
                <input type="text" id="admin-optC" placeholder="Option C">
                <input type="text" id="admin-optD" placeholder="Option D">
                <input type="text" id="admin-optE" placeholder="Option E">
                <input type="text" id="admin-correct" placeholder="Correct Letter (A, B, C, D, or E)">
                <textarea id="admin-explanation" placeholder="Explanation"></textarea>
                <button onclick="uploadMCQ()">Upload to Cloud</button>
                <button onclick="showView('dashboard-screen')" class="btn-secondary">Back to Dashboard</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDc-yEvFYvP8_OZedCyIqXjpEOnocOe87k",
            authDomain: "the-medbytes-4e614.firebaseapp.com",
            projectId: "the-medbytes-4e614",
            storageBucket: "the-medbytes-4e614.firebasestorage.app",
            messagingSenderId: "508245128582",
            appId: "1:508245128582:web:c4285259f6812a30026807",
            measurementId: "G-GYJ0EHS7M5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const subjects = ["Pharmacology", "Pathology", "Forensic Medicine", "Community Medicine", "Medicine", "Surgery", "Behavioral Sciences", "Patient Safety", "Family Medicine"];
        let currentQuestions = [];
        let currentIndex = 0;

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        // --- AUTH ---
        window.login = () => {
            signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        };
        window.register = () => {
            createUserWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        };
        window.handleLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                document.getElementById('logout-btn').classList.remove('hidden');
                showView('dashboard-screen');
                renderSubjects();
            } else {
                showView('auth-screen');
            }
        });

        // --- ADMIN UPLOADER ---
        window.uploadMCQ = async () => {
            try {
                await addDoc(collection(db, "mcqs"), {
                    subject: document.getElementById('admin-subject').value,
                    question: document.getElementById('admin-question').value,
                    optionA: document.getElementById('admin-optA').value,
                    optionB: document.getElementById('admin-optB').value,
                    optionC: document.getElementById('admin-optC').value,
                    optionD: document.getElementById('admin-optD').value,
                    optionE: document.getElementById('admin-optE').value,
                    correctAnswer: document.getElementById('admin-correct').value.toUpperCase(),
                    explanation: document.getElementById('admin-explanation').value
                });
                alert("MCQ Uploaded!");
            } catch (e) { alert(e.message); }
        };

        // --- QUIZ LOGIC ---
        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            subjects.forEach(s => {
                const div = document.createElement('div');
                div.className = 'subject-card';
                div.innerHTML = `<h4>${s}</h4><button onclick="startQuiz('${s}')">Practice</button>`;
                list.appendChild(div);
            });
        }

        window.startQuiz = async (subject) => {
            const selectedMode = document.querySelector('input[name="quiz-mode"]:checked').value;
            const q = query(collection(db, "mcqs"), where("subject", "==", subject));
            const snapshot = await getDocs(q);
            currentQuestions = snapshot.docs.map(doc => doc.data()).sort(() => Math.random() - 0.5);
            
            if (selectedMode === 'exam') currentQuestions = currentQuestions.slice(0, 20);
            if (currentQuestions.length === 0) return alert("No questions yet!");

            currentIndex = 0;
            showView('quiz-screen');
            loadQuestion();
        };

        function loadQuestion() {
            const data = currentQuestions[currentIndex];
            document.getElementById('quiz-subject-title').innerText = data.subject
