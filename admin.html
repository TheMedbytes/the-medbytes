<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBytes | Admin Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <nav>
        <div class="logo"><span>MedBytes Admin</span></div>
        <button onclick="window.location.href='index.html'">View Portal</button>
    </nav>

    <main class="container">
        <div class="card">
            <h2>Excel Bulk Upload</h2>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
            <button class="btn-primary" onclick="uploadExcel()" style="background:#27ae60">Process Excel</button>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>JSON Bulk Upload</h2>
            <textarea id="json-input" placeholder="Paste JSON array here..." style="width:100%; height:150px; margin-bottom:10px;"></textarea>
            <button class="btn-primary" onclick="uploadJSON()" style="background:#2980b9">Process JSON</button>
        </div>

        <div id="status-log" style="margin-top:20px; color: #7f8c8d; font-family: monospace;"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Your specific config
        const firebaseConfig = {
            apiKey: "AIzaSyDc-yEvFYvP8_OZedCyIqXjpEOnocOe87k",
            authDomain: "the-medbytes-4e614.firebaseapp.com",
            projectId: "the-medbytes-4e614",
            storageBucket: "the-medbytes-4e614.firebasestorage.app",
            messagingSenderId: "508245128582",
            appId: "1:508245128582:web:c4285259f6812a30026807"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const log = (msg) => {
            const div = document.getElementById('status-log');
            div.innerHTML += `> ${msg}<br>`;
        };

        // Common uploader function
        async function saveToFirestore(dataArray) {
            log(`Starting upload of ${dataArray.length} items...`);
            let count = 0;
            for (const item of dataArray) {
                try {
                    await addDoc(collection(db, "mcqs"), {
                        subject: item.subject,
                        question: item.question,
                        optionA: String(item.optionA),
                        optionB: String(item.optionB),
                        optionC: String(item.optionC),
                        optionD: String(item.optionD),
                        optionE: String(item.optionE),
                        correctAnswer: String(item.correctAnswer).toUpperCase().trim(),
                        explanation: item.explanation || ""
                    });
                    count++;
                } catch (e) { log(`Error at item ${count}: ${e.message}`); }
            }
            log(`Upload Complete! Success: ${count}`);
            alert(`Uploaded ${count} MCQs successfully.`);
        }

        window.uploadExcel = () => {
            const file = document.getElementById('excel-file').files[0];
            if (!file) return alert("Select a file first.");
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                saveToFirestore(data);
            };
            reader.readAsArrayBuffer(file);
        };

        window.uploadJSON = () => {
            try {
                const data = JSON.parse(document.getElementById('json-input').value);
                if(!Array.isArray(data)) throw new Error("Input must be a JSON array.");
                saveToFirestore(data);
            } catch (e) { alert("Invalid JSON: " + e.message); }
        };
    </script>
</body>
</html>
